name: Platform tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run shared and platform tests
        run: python -m pytest -q

      - name: Validate macOS launch scripts
        if: runner.os == 'macOS'
        run: bash -n install.command run.command RosterMate.app/Contents/MacOS/RosterMate

      - name: Validate Windows PowerShell scripts
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $failed = $false
          foreach ($file in @("install-windows.ps1", "run-windows.ps1")) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Format-List
              $failed = $true
            }
          }
          if ($failed) { exit 1 }
