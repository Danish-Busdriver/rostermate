name: Build Windows installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: "RosterMate version without leading v"
        required: true
        default: "1.6.2"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install and test shared application
        run: |
          python -m pip install -r requirements.txt
          python -m pytest -q

      - name: Install Inno Setup
        shell: powershell
        run: |
          if (-not (Test-Path "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe")) {
            choco install innosetup --no-progress -y
          }

      - name: Build Setup.exe
        shell: powershell
        run: |
          $Compiler = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $Compiler "/DAppVersion=${{ inputs.version }}" "installer\windows\RosterMate.iss"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Validate installer
        shell: powershell
        run: |
          $Installer = "dist\windows\RosterMate-${{ inputs.version }}-Windows-Setup.exe"
          if (-not (Test-Path $Installer)) { throw "Installer blev ikke oprettet" }
          Get-Item $Installer | Format-List Name, Length, LastWriteTime

      - name: Install and launch packaged application
        shell: powershell
        run: |
          $Installer = (Resolve-Path "dist\windows\RosterMate-${{ inputs.version }}-Windows-Setup.exe").Path
          $InstallDir = Join-Path $env:RUNNER_TEMP "RosterMate-E2E"
          & $Installer /VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP- "/DIR=$InstallDir"
          if ($LASTEXITCODE -ne 0) { throw "Setup.exe fejlede med kode $LASTEXITCODE" }

          $env:ROSTERMATE_NO_BROWSER = "1"
          & powershell.exe -NoProfile -ExecutionPolicy Bypass -File (Join-Path $InstallDir "run-windows.ps1")
          if ($LASTEXITCODE -ne 0) { throw "Den installerede RosterMate-start fejlede" }

          $Python = Join-Path $InstallDir ".venv\Scripts\python.exe"
          $Port = & $Python (Join-Path $InstallDir "port_config.py") configured
          $Health = Invoke-RestMethod -Uri "http://127.0.0.1:$Port/health" -TimeoutSec 5
          if ($Health.version -ne "${{ inputs.version }}") { throw "Forkert serverversion: $($Health.version)" }

          Start-Sleep -Seconds 2
          $TrayPidFile = Join-Path $env:LOCALAPPDATA "RosterMate\rostermate-tray.pid"
          if (-not (Test-Path $TrayPidFile)) { throw "Tray-ikonprocessen blev ikke startet" }
          $TrayPid = [int]((Get-Content $TrayPidFile -Raw).Split(",")[0])
          if (-not (Get-Process -Id $TrayPid -ErrorAction SilentlyContinue)) { throw "Tray-ikonprocessen kører ikke" }

          & (Join-Path $InstallDir "unins000.exe") /VERYSILENT /SUPPRESSMSGBOXES /NORESTART
          if ($LASTEXITCODE -ne 0) { throw "Afinstallationen fejlede med kode $LASTEXITCODE" }

      - uses: actions/upload-artifact@v4
        with:
          name: RosterMate-${{ inputs.version }}-Windows-Setup
          path: dist/windows/RosterMate-${{ inputs.version }}-Windows-Setup.exe
          if-no-files-found: error
          retention-days: 14
